<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success — BotBuddy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0F0F1A;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .success-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .icon { font-size: 60px; margin-bottom: 20px; }
        h1 { font-size: 28px; margin-bottom: 10px; color: #fff; }
        p { opacity: 0.7; margin-bottom: 30px; line-height: 1.5; }
        
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 12px;
            transition: 0.3s;
        }
        .btn-primary {
            background: #6366F1;
            color: white;
        }
        .btn-primary:hover { background: #4f46e5; }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon">🤖</div>
        <h1>Your bot is alive!</h1>
        <p>Great job, Zain! Your AI assistant is trained and ready to start chatting with your customers.</p>
        
        <a href="dashboard.html" class="btn btn-primary">Go to Dashboard</a>
        <a href="profile.html" class="btn btn-secondary">View Profile</a>
    </div>

</body>
</html>
